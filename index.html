function calc(){
 const totalModules=semesters.reduce((a,s)=>a+s.modules.length,0); const doneModules=Object.keys(state.done).filter(k=>k.startsWith('module:')&&state.done[k]).length;
 const totalProjects=semesters.reduce((a,s)=>a+s.projectChecks.length,0); const doneProjects=Object.keys(state.done).filter(k=>k.startsWith('project:')&&state.done[k]).length;
 const totalWeeks=52; const doneWeeks=Object.values(state.weekDone).filter(Boolean).length;
 const modulesPct=Math.round(doneModules/totalModules*100)||0; const projectsPct=Math.round(doneProjects/totalProjects*100)||0; const weeksPct=Math.round(doneWeeks/totalWeeks*100)||0;
 const overall=Math.round((modulesPct*.45)+(projectsPct*.30)+(weeksPct*.25));
 const semProg={}; semesters.forEach(s=>{let md=s.modules.filter((m,i)=>completed(key('module',s.id+'-'+i))).length/s.modules.length*60;let pr=s.projectChecks.filter((p,i)=>completed(key('project',s.id+'-'+i))).length/s.projectChecks.length*25;let wk=weeks.filter(w=>w.semester==='S'+s.order);let wd=wk.filter(w=>state.weekDone[w.week]).length/Math.max(1,wk.length)*15;semProg[s.id]=Math.round(md+pr+wd)});
 const skill={}; Object.keys(skillWeights).forEach(sk=>{let sems=semesters.filter(s=>s.skill===sk); skill[sk]=sems.length?Math.round(sems.reduce((a,s)=>a+semProg[s.id],0)/sems.length):0}); skill.Excel=Math.max(skill.Excel,semProg.s1||0);
 const job=Math.round(Object.entries(skillWeights).reduce((a,[sk,w])=>a+(skill[sk]||0)*w/100,0));
 const current=semesters.find(s=>semProg[s.id]<80)||semesters[5];
 return {totalModules,doneModules,totalProjects,doneProjects,doneWeeks,overall,modulesPct,projectsPct,weeksPct,semProg,skill,job,current};
}

function renderDashboard(){const c=calc(); const due=weeks.find(w=>!state.weekDone[w.week])||weeks[51]; const weak=state.weakAreas.filter(w=>w.status!=='resolved'); $('dashboard').innerHTML=`

function renderSemesters(){const c=calc(); $('semesters').innerHTML=`<div class="grid cols3">${semesters.map(s=>`<div class="card semester-card"><div class="semester-top"><div><span class="pill ${c.semProg[s.id]>=80?'green':'gold'}">S${s.order} • ${s.months}</span><h3>${s.theme}</h3></div><b>${c.semProg[s.id]}%</b></div><p>${s.desc}</p><div class="barline"><i style="width:${c.semProg[s.id]}%"></i></div><p><b>Main outcome:</b> ${s.outcome}</p><div class="module-list">${s.modules.map((m,i)=>`<div class="module"><div class="module-head"><h4>${m[0]}</h4><label><input type="checkbox" ${completed(key('module',s.id+'-'+i))?'checked':''} onchange="toggle('${key('module',s.id+'-'+i)}',this.checked)"></label></div><ul>${m[1].slice(0,4).map(x=>`<li>${x}</li>`).join('')}</ul><div class="module-actions"><button class="btn small" onclick="openLesson('${s.id}',${i})">Open lesson</button></div></div>`).join('')}</div><details><summary class="pill blue">Learning outcomes</summary><ul>${s.outcomes.map(o=>`<li>${o}</li>`).join('')}</ul></details><h4>Semester Project Checklist</h4>${s.projectChecks.map((p,i)=>`<label class="check"><input type="checkbox" ${completed(key('project',s.id+'-'+i))?'checked':''} onchange="toggle('${key('project',s.id+'-'+i)}',this.checked)"><span>${p}</span></label>`).join('')}</div>`).join('')}</div>`}

function renderPractice(){const c=calc(); const common=['Watching too much content without practice','Skipping documentation of insights','Not revising weak topics weekly','Building dashboards without business questions','Copying projects without understanding decisions']; $('practice').innerHTML=`<div class="grid cols3"><div class="card pad stat"><div class="label">Semester GPA Formula</div><div class="num">${(c.overall/10).toFixed(1)}</div><div class="hint">Weighted score converted to 10-point scale.</div></div><div class="card pad stat"><div class="label">Revision Completion</div><div class="num">10%</div><div class="hint">R1 after 2 days, R2 after 7 days, R3 after 30 days, R4 before interview.</div></div><div class="card pad stat"><div class="label">Weak Signal Rule</div><div class="num">&lt;70%</div><div class="hint">Scores below 70% enter revision queue.</div></div></div><div class="grid cols2" style="margin-top:18px"><div class="card pad"><span class="premium">Assessment Weights</span><table class="table"><tr><th>Component</th><th>Weight</th><th>Measures</th></tr>${[['Quizzes','20%','Concept clarity'],['Practice Tasks','25%','Hands-on consistency'],['Assignments','20%','Application ability'],['Projects','25%','Real-world readiness'],['Revision Completion','10%','Long-term retention']].map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('')}</table></div><div class="card pad"><span class="premium">Add Assessment Score</span><div class="form-grid"><select class="input" id="scoreSkill">${Object.keys(skillWeights).map(x=>`<option>${x}</option>`).join('')}</select><input class="input" id="scoreTopic" placeholder="Topic e.g. Joins"><input class="input" id="scoreVal" type="number" min="0" max="100" placeholder="Score %"></div><textarea class="input" id="scoreReason" placeholder="What went wrong?" style="margin-top:12px"></textarea><button class="btn gold" style="margin-top:12px" onclick="addScore()">Save score</button></div></div><div class="grid cols2" style="margin-top:18px"><div class="card pad"><span class="premium">Weak Area Detection</span>${state.weakAreas.length?state.weakAreas.map(w=>`<div class="module"><div class="module-head"><b>${w.topic}</b><span class="pill ${w.status==='resolved'?'green':'red'}">${w.status||'open'}</span></div><p style="color:var(--muted)">${w.skill} • ${w.reason}</p></div>`).join(''):'<div class="empty">No weak areas logged.</div>'}</div><div class="card pad"><span class="premium">Common Mistakes to Avoid</span>${common.map(x=>`<label class="check"><input type="checkbox"><span>${x}</span></label>`).join('')}</div></div>`}

al queue','Smart spaced repetition'],['Career','Resume checklist','Application tracker + interview scheduler']].map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('')}</table></div>`}
